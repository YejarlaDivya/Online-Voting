<!DOCTYPE html>
<html>
<head>
<title>Vote | Online Voting System</title>
<style>
body {
    font-family: Arial;
    }

.box {
    border:solid;
    width: 320px;
    margin: 50px auto;
    padding: 20px;
    text-align: center;

}
#party
{
    background-color:yellow ;
    color:red;
}
.candidate img {
    width: 120px;
    margin: 10px ;
}
button {
    padding: 8px 15px;
    margin-bottom: 15px;
}
</style>
</head>
<body>



<div class="box">
    <h2 id="party">Select Party</h2>

    <!-- JanaSena -->
    <div class="candidate">
        <img src="janasena.jpg" alt="JanaSena Party">
        <br>
        <button>Vote</button>
    </div>

    <!-- TDP -->
    <div class="candidate">
        <img src="tdp.jpg" alt="TDP Party">
        <br>
        <button>Vote</button>
    </div>

</div>

</body>
</html>
